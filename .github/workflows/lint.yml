name: Notebook Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 numpy scipy

      - name: Lint library
        run: flake8 lib/ --max-line-length=120 --ignore=E501,W503,E302,E303

      - name: Lint notebooks (stripped of Databricks magic)
        run: |
          for f in notebooks/*.py tests/*.py; do
            clean="/tmp/$(basename "$f")"
            grep -v '^# MAGIC' "$f" | grep -v '^# COMMAND' | grep -v '^# Databricks' > "$clean"
            echo "Checking $f..."
            flake8 "$clean" --max-line-length=120 --ignore=E501,W503,E302,E303,E402,F821,F401 || true
          done

      - name: Verify formula imports
        run: python -c "from lib.prediction_formulas import riegel, compute_vdot, vdot_time, elevation_adjusted_riegel; print('OK: all formula imports resolve')"
